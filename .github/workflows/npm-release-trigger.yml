name: Release

on:
  push:
    branches: [master]
  # Snapshot publish: bumps versions on the runner only and publishes
  # under a custom dist-tag via OIDC. Use to ship a *throwaway*
  # prerelease ahead of a real release. Must not be a semver-shaped
  # value — the canonical reusable workflow validates and aborts on
  # such input.
  workflow_dispatch:
    inputs:
      snapshot_tag:
        description: 'npm dist-tag for snapshot (e.g. canary, pre-3.9.10). Non-semver values only.'
        required: false
        default: 'snapshot'

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm OIDC trusted publishing

jobs:
  release:
    uses: 0xPolygon/pipelines/.github/workflows/apps-npm-release.yml@main
    # matic.js's default branch is `master`, not `main`. The shared
    # workflow uses this for the post-publish lockfile commit
    # (PATCH refs/heads/<branch>) and the pre-tag fast-forward fetch.
    #
    # `snapshot_tag` is empty on the `push` event (no `inputs.snapshot_tag`
    # to forward), so the reusable workflow runs the standard release
    # job. On `workflow_dispatch` the supplied dist-tag is forwarded
    # and the reusable workflow runs the snapshot job instead.
    with:
      default_branch: master
      snapshot_tag: ${{ inputs.snapshot_tag || '' }}
    secrets:
      CHANGESET_RELEASE_BOT_APP_ID: ${{ secrets.CHANGESET_RELEASE_BOT_APP_ID }}
      CHANGESET_RELEASE_BOT_APP_PRIVATE_KEY: ${{ secrets.CHANGESET_RELEASE_BOT_APP_PRIVATE_KEY }}
